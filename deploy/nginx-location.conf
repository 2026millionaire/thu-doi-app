# Thêm 2 block dưới vào /etc/nginx/sites-enabled/phieuck
# KHÔNG BẮT BUỘC vị trí — nginx match longest-prefix, nhưng đặt cạnh các block /bk/ cho có tổ chức.
# Pattern giống /ctkm/: upstream giữ prefix, KHÔNG dùng X-Forwarded-Prefix, KHÔNG sub_filter.

    location /bk/thudoi/ {
        proxy_pass http://127.0.0.1:5052/bk/thudoi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }
    location = /bk/thudoi { return 301 /bk/thudoi/; }
